name: CI

# Runs on every pull request and on pushes to main. Green CI is a prerequisite
# for merging a PR (see CONTRIBUTING.md). Releases are cut separately by the
# maintainer via version tags (see release.yml).
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      # The cavs-client integration tests spawn the cavs-server / cavs CLI
      # binaries by path, so they must exist before the tests run. On a clean
      # runner `cargo test` may reach those tests before the sibling crates'
      # binaries are built, so build all binaries up front.
      - name: Build binaries
        run: cargo build --workspace --bins

      - name: Test
        run: cargo test --all
