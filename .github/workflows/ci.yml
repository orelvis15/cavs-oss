name: CI

# Runs on every pull request and on pushes to main. Green CI is a prerequisite
# for merging a PR (see CONTRIBUTING.md). Releases are cut separately by the
# maintainer via version tags (see release.yml).
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      # The cavs-client integration tests spawn the cavs-server / cavs CLI
      # binaries by path, so they must exist before the tests run. On a clean
      # runner `cargo test` may reach those tests before the sibling crates'
      # binaries are built, so build all binaries up front.
      - name: Build binaries
        run: cargo build --workspace --bins

      - name: Test
        run: cargo test --all

  sdk-go:
    name: sdk · go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Build + stage native library
        run: make -C sdks/go native
      - name: Vet
        working-directory: sdks/go
        run: go vet ./...
      - name: Test
        working-directory: sdks/go
        run: go test ./...

  sdk-kotlin:
    name: sdk · kotlin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Build native library
        run: cargo build --release -p cavs-ffi
      - name: Test (Gradle)
        working-directory: sdks/kotlin
        env:
          CAVS_SDK_LIBRARY: ${{ github.workspace }}/target/release/libcavs_sdk.so
        run: gradle test --no-daemon

  sdk-node:
    name: sdk · node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdks/node/package-lock.json
      - name: Build + stage native library
        working-directory: sdks/node
        run: npm run native
      - name: Install
        working-directory: sdks/node
        run: npm ci
      - name: Test
        working-directory: sdks/node
        run: npm test
