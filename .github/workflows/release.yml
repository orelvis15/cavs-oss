name: Release (core + SDKs)

# Release train for the Rust core and the language SDKs, which share one
# version (the SDKs bind the core through a C ABI). Triggered by a plain
# `vX.Y.Z` tag — e.g. `git tag v1.3.0 && git push origin v1.3.0`.
#
# The other products release on their own trains, independently versioned:
#   - engine plugins → `plugins-vX.Y.Z`  (release-plugins.yml)
#   - desktop app    → `desktop-vX.Y.Z`  (release-desktop.yml)
# Those prefixed tags do NOT match `v*`, so this workflow only ever fires for
# the core+SDK train. Merging a PR does nothing on its own; you cut a release
# by tagging. `workflow_dispatch` allows a manual run too.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to build (e.g. v0.1.0)'
        required: true

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: macos-14,         target: aarch64-apple-darwin }
          # GitHub's Intel macOS runners (macos-13) are deprecated and often
          # never get picked up, so build the x86_64 binary by cross-compiling
          # on an arm64 runner (the Apple toolchain targets both archs).
          - { os: macos-14,         target: x86_64-apple-darwin }
          - { os: windows-latest,   target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binaries
        run: >
          cargo build --release --target ${{ matrix.target }}
          --bin cavs --bin cavs-server --bin cavs-client --bin cavs-lfs-agent

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          DIST="cavs-${VERSION}-${{ matrix.target }}"
          BINDIR="target/${{ matrix.target }}/release"
          mkdir "$DIST"
          for b in cavs cavs-server cavs-client cavs-lfs-agent; do
            if [ -f "$BINDIR/$b.exe" ]; then cp "$BINDIR/$b.exe" "$DIST/"; else cp "$BINDIR/$b" "$DIST/"; fi
          done
          cp README.md LICENSE NOTICE "$DIST/"
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "$DIST.zip" "$DIST" >/dev/null
          else
            tar czf "$DIST.tar.gz" "$DIST"
          fi
          # Also publish the LFS agent as a standalone binary named
          # cavs-lfs-agent-<target>, so the CAVS Node CLI installer
          # (cavs-hub-cli/install.sh) can fetch it directly from Releases.
          if [ -f "$BINDIR/cavs-lfs-agent.exe" ]; then
            cp "$BINDIR/cavs-lfs-agent.exe" "cavs-lfs-agent-${{ matrix.target }}.exe"
          else
            cp "$BINDIR/cavs-lfs-agent" "cavs-lfs-agent-${{ matrix.target }}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip
            cavs-lfs-agent-${{ matrix.target }}*

  sdk-native:
    name: sdk native ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  lib: libcavs_sdk.so }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, lib: libcavs_sdk.so }
          - { os: macos-14,       target: aarch64-apple-darwin,       lib: libcavs_sdk.dylib }
          - { os: macos-14,       target: x86_64-apple-darwin,        lib: libcavs_sdk.dylib }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,     lib: cavs_sdk.dll }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build native library
        run: cargo build --release --target ${{ matrix.target }} -p cavs-ffi

      - name: Package native library + header + checksum
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          DIST="cavs-sdk-native-${VERSION}-${{ matrix.target }}"
          mkdir "$DIST"
          cp "target/${{ matrix.target }}/release/${{ matrix.lib }}" "$DIST/"
          cp core/cavs-ffi/include/cavs_sdk.h "$DIST/"
          cp LICENSE NOTICE "$DIST/"
          # Windows also emits an import library for cgo/link consumers.
          if [ -f "target/${{ matrix.target }}/release/cavs_sdk.dll.lib" ]; then
            cp "target/${{ matrix.target }}/release/cavs_sdk.dll.lib" "$DIST/"
          fi
          # SHA-256 sidecar (verified by the Java/Node loaders).
          ( cd "$DIST"
            if command -v sha256sum >/dev/null; then
              sha256sum "${{ matrix.lib }}" > "${{ matrix.lib }}.sha256"
            else
              shasum -a 256 "${{ matrix.lib }}" > "${{ matrix.lib }}.sha256"
            fi
          )
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "$DIST.zip" "$DIST" >/dev/null
          else
            tar czf "$DIST.tar.gz" "$DIST"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-native-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip

  release:
    name: publish release
    needs: [build, sdk-native]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  publish-npm:
    name: publish npm packages
    needs: sdk-native
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          path: native-artifacts
          pattern: sdk-native-*
          merge-multiple: true

      - name: Publish
        working-directory: sdks/node
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN not set; skipping npm publish."
            exit 0
          fi
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"; VERSION="${VERSION#v}"
          EX="$GITHUB_WORKSPACE/native-extracted"; mkdir -p "$EX"
          for a in "$GITHUB_WORKSPACE"/native-artifacts/*.tar.gz; do [ -f "$a" ] && tar xzf "$a" -C "$EX"; done
          for a in "$GITHUB_WORKSPACE"/native-artifacts/*.zip; do [ -f "$a" ] && unzip -o "$a" -d "$EX" >/dev/null; done
          npm ci
          npm run build
          # Publish one package, tolerating only "already published" (so a
          # re-run is idempotent) and failing the job on any real error —
          # e.g. a token without 2FA-bypass returns E403, which must not be
          # silently swallowed. NPM_TOKEN must be an Automation token.
          npm_pub() {
            local target="$1" label="${1:-main package}" out
            if out=$(npm publish "$target" --access public 2>&1); then
              echo "$out"; echo "published $label"
            else
              echo "$out"
              if echo "$out" | grep -qiE "cannot publish over|previously published|already published|EPUBLISHCONFLICT"; then
                echo "skip $label (this version is already on npm)"
              else
                echo "::error::npm publish failed for $label"
                return 1
              fi
            fi
          }
          # Per-platform native packages, then the main package.
          node scripts/build-npm-platform-packages.mjs "$EX" "$VERSION"
          for dir in npm/*/; do npm_pub "$dir"; done
          npm_pub .

  publish-maven:
    name: publish to maven central
    needs: sdk-native
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
      CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          path: native-artifacts
          pattern: sdk-native-*
          merge-multiple: true

      - name: Bundle native libraries into resources and deploy to Maven Central
        working-directory: sdks/kotlin
        run: |
          set -euo pipefail
          # Maven Central requires signed artifacts, so both the Portal token
          # (CENTRAL_USERNAME/PASSWORD) and a GPG key are needed. Skip cleanly
          # when either is absent so the release doesn't fail.
          if [ -z "${CENTRAL_USERNAME:-}" ]; then
            echo "CENTRAL_USERNAME not set; skipping Maven Central publish."
            exit 0
          fi
          if [ -z "${GPG_PRIVATE_KEY:-}" ]; then
            echo "GPG_PRIVATE_KEY not set; Maven Central rejects unsigned artifacts. Skipping."
            exit 0
          fi
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"; VERSION="${VERSION#v}"
          EX="$GITHUB_WORKSPACE/native-extracted"; mkdir -p "$EX"
          for a in "$GITHUB_WORKSPACE"/native-artifacts/*.tar.gz; do [ -f "$a" ] && tar xzf "$a" -C "$EX"; done
          for a in "$GITHUB_WORKSPACE"/native-artifacts/*.zip; do [ -f "$a" ] && unzip -o "$a" -d "$EX" >/dev/null; done
          # Lay out libs as /native/<os>-<arch>/<lib>(.sha256) for the loader.
          declare -A MAP=(
            [x86_64-unknown-linux-gnu]=linux-x86_64
            [aarch64-unknown-linux-gnu]=linux-aarch64
            [x86_64-apple-darwin]=macos-x86_64
            [aarch64-apple-darwin]=macos-aarch64
            [x86_64-pc-windows-msvc]=windows-x86_64
          )
          RES=src/main/resources/native
          for target in "${!MAP[@]}"; do
            src="$EX/cavs-sdk-native-${VERSION}-${target}"
            [ -d "$src" ] || src="$EX/cavs-sdk-native-v${VERSION}-${target}"
            [ -d "$src" ] || continue
            dst="$RES/${MAP[$target]}"; mkdir -p "$dst"
            cp "$src"/libcavs_sdk.* "$src"/cavs_sdk.dll "$dst/" 2>/dev/null || true
          done
          # settings.xml providing the `central` server credentials (the
          # Portal token) that central-publishing-maven-plugin reads.
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>\${env.CENTRAL_USERNAME}</username>
                <password>\${env.CENTRAL_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          mvn -B -q versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false
          # Deploy, tolerating only "this version already exists on Central"
          # (so a re-run — or a cancelled run whose async Portal publish
          # already landed — is idempotent) while failing on any real error.
          # Central rejects a duplicate GAV with a 400/409 whose body says the
          # version is already published/promoted; anything else is fatal.
          if out=$(mvn -B -Prelease -DskipTests -Dgpg.passphrase="${GPG_PASSPHRASE:-}" deploy 2>&1); then
            echo "$out"; echo "published cavs-sdk $VERSION to Maven Central"
          else
            echo "$out"
            if echo "$out" | grep -qiE "already (exists|published|promoted|released)|has already been|duplicate|409 conflict|version .* exists"; then
              echo "skip cavs-sdk $VERSION (this version is already on Maven Central)"
            else
              echo "::error::Maven Central deploy failed for cavs-sdk $VERSION"
              exit 1
            fi
          fi

  publish-go-tag:
    name: tag go submodule
    needs: [release, sdk-native]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push sdks/go submodule tag
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          TAG="sdks/go/${VERSION}"
          # `go get github.com/orelvis15/cavs-oss/sdks/go@<VERSION>` resolves
          # this submodule tag on the tagged commit.
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "tag ${TAG} already exists"
          else
            git tag "${TAG}" "${GITHUB_SHA}"
            git push origin "${TAG}"
          fi

  publish-crates:
    name: publish to crates.io
    needs: build
    # Only publish on real tag pushes (not workflow_dispatch, which checks out a
    # branch rather than the tagged commit). Requires the CRATES_IO_TOKEN secret.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail
          publish() {
            local crate="$1"
            echo "::group::publish $crate"
            local out
            if out=$(cargo publish -p "$crate" 2>&1); then
              echo "$out"
              echo "published $crate"
            else
              echo "$out"
              # Treat an already-published version as success so re-running the
              # workflow (or a partially-completed publish) is idempotent.
              if echo "$out" | grep -qiE "already (exists|uploaded)|already been (published|uploaded)|crate version .* is already"; then
                echo "skip $crate (this version is already on crates.io)"
              else
                echo "::endgroup::"
                echo "::error::failed to publish $crate"
                return 1
              fi
            fi
            echo "::endgroup::"
          }
          # cargo publish waits for each crate to appear in the index before
          # returning, so publishing in dependency order is enough.
          # cavs-signature (needs cavs-hash) and cavs-rebuild-plan are v0.6.0
          # additions; cavs-plan (needs cavs-signature/cavs-proto) is the
          # v0.7.0 addition; cavs-analyzer and cavs-workspace are the v0.9.0
          # additions (cavs-steam was removed in v0.9.0). All must precede
          # cavs-cli/cavs-client, which depend on them.
          # cavs-sdk-core (the SDK operation engine) and cavs-ffi (its C ABI)
          # are the v1.1.0 SDK additions; both depend on the core crates above
          # and must precede cavs-cli/server/client.
          # cavs-fetch (the v1.4.0 embeddable fetch engine) is a dependency of
          # cavs-sdk-core, so it must precede it.
          # v1.5.0: cavs-store now depends on cavs-proto (static manifest
          # export), so cavs-proto moved ahead of cavs-store; cavs-lfs-agent
          # (the Git LFS transfer agent) is a leaf binary published last.
          for crate in cavs-hash cavs-chunker cavs-proto cavs-store cavs-format \
                       cavs-manifest cavs-signature cavs-rebuild-plan cavs-plan \
                       cavs-analyzer cavs-workspace cavs-fetch cavs-sdk-core cavs-ffi \
                       cavs-cli cavs-server cavs-client cavs-lfs-agent; do
            publish "$crate"
          done
