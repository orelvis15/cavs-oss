name: Update Godot Asset Library

# When a GitHub Release is published (by release.yml on a version tag), push an
# updated copy of the Godot plugin to the Asset Library.
#
# The Asset Library installs the archive of a single commit and expects the
# `addons/` folder at its root, but the plugin lives under `godot-plugin/` in
# this monorepo. So we `git subtree split` that folder onto a dedicated
# `godot-asset` branch (whose root IS `addons/cavs/...`) and point the Asset
# Library at that branch's commit.
#
# One-time setup (see docs/PUBLISHING.md § Godot Asset Library):
#   1. Submit the plugin once via the web form to obtain its numeric asset id.
#   2. Repository → Settings → Secrets and variables → Actions:
#        - Variable  GODOT_ASSET_ID            = the numeric asset id
#        - Variable  GODOT_ASSET_LIB_USERNAME  = your godotengine.org username
#        - Secret    GODOT_ASSET_LIB_PASSWORD  = your godotengine.org password
#   Until GODOT_ASSET_ID is set, this workflow is a no-op.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write   # to push the generated godot-asset branch

jobs:
  update:
    name: submit asset edit
    runs-on: ubuntu-latest
    if: vars.GODOT_ASSET_ID != ''
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # subtree split needs full history

      - name: Build root-level plugin branch (addons/ at repo root)
        run: |
          set -euo pipefail
          git subtree split --prefix=godot-plugin -b godot-asset
          git push -f origin godot-asset
          V="${{ github.event.release.tag_name || github.ref_name }}"
          {
            echo "ASSET_COMMIT=$(git rev-parse godot-asset)"
            echo "ASSET_VERSION=${V#v}"
          } >> "$GITHUB_ENV"

      - name: Submit edit to the Godot Asset Library
        uses: deep-entertainment/godot-asset-lib-action@v0.4.0
        with:
          action: addEdit
          username: ${{ vars.GODOT_ASSET_LIB_USERNAME }}
          password: ${{ secrets.GODOT_ASSET_LIB_PASSWORD }}
          assetId: ${{ vars.GODOT_ASSET_ID }}
          assetTemplate: .asset-template.json.hb
